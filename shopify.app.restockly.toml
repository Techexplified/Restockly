# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "24c69cb6a7fb9c5ae05fd59b930deef9"
application_url = "https://example.com"
embedded = true
name = "Restockly"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_orders,read_locales,read_markets,read_products,read_translations,write_inventory,write_locales,write_products,write_translations"
  
[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/products/update"
  topics = [ "products/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/inventory_levels/update"
  topics = [ "inventory_levels/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

[build]
automatically_update_urls_on_dev = true

[app_proxy]
url = "https://example.com"
subpath = "restockly-api"
prefix = "apps"
